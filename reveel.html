<html>
    <head>
        <title>Evgenii's Final Project for Typography & Interaction</title>

        <!-- <script defer src="popup.js"></script> -->
        <script type="module" src="popup.js"></script>
    </head>
    <body>
        <nav class="top">
            <h1>
                <span id="logo" class="ext-h1-text"></span>
                <img src="images/logo.svg" alt="revEel intro text" aria-hidden="true">
            </h1>
        </nav>
        <nav class="bottom">
