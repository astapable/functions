<html>
    <head>
        <title>Evgenii's Final Project for Typography & Interaction</title>
        <link rel="stylesheet" href="reset.css">
        <link rel="stylesheet" href="style.css">
        <!-- <script defer src="popup.js"></script> -->
        <script type="module" src="popup.js"></script>
    </head>
    <body>
        <nav class="top">
            <div class="nav-wrapper-top">
                <h1>
                    <span id="logo" class="ext-h1-text"></span>
                    <img src="images/logo.svg" alt="revEel intro text" aria-hidden="true">
                </h1>
            </div>
        </nav>
        <nav class="bottom">
            <div class="nav-wrapper-bottom">
                <button data-filter="home">Home</button>
                <button data-filter="fonts">Fonts</button>
                <button data-filter="colors">Colors</button>
                <button data-filter="about">About</button>
                <button data-filter="dev">Dev</button>
            </div>
        </nav>
        <main>
            <section id="display" data-category="home">
                <div class="display-box"><h4>Lorem ipsum dolor sit amet, consectetur adipiscing elit</h4></div>

            <article>

                    <h2>Fonts Summary</h2>
                    <ul id="typo-summary"></ul>

                <section id="font" data-category="fonts">
                    <h2>Fonts</h2>
                    <ul id="typography"></ul>
                </section>
    
                <section id="home-colors" data-category="home">
                    <h2>Colors Summary</h2>
                    <div class="text-category-wrapper">
                        <ul id="color-summary"></ul>
                    </div>
                </section>
    
                <section id="colors" data-category="colors">
                    <h2>Colors</h2>
                    <ul id="all-colors"></ul>
